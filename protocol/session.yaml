# Unified session protocol: pairing + transport management.
#
# Single state machine covering the entire session lifecycle from
# initial pairing through transport path switching. Three actors:
# backend, client, relay.
#
# Phase 1 — Pairing: ECDH key exchange, confirmation code verification,
# device secret establishment. The "cli" actor from the original pairing
# spec is folded into backend as local actions (user input, not protocol).
#
# Phase 2 — Transport: relay (permanent baseline) + LAN (direct, optional).
# Health monitoring, exponential backoff, resource lifecycle management.
#
# The transition from Phase 1 to Phase 2 is:
#   backend: SessionActive → RelayConnected (on session_established)
#   client:  SessionActive → RelayConnected (on session_established)
#
# For reconnection with a saved PairingRecord, the executor starts at
# RelayConnected directly, skipping Phase 1.

name: Session
one_shot: false
channel_bound: 3

messages:
  # --- Phase 1: Pairing ---
  pair_hello:
    from: client
    to: backend
    desc: ECDH pubkey + pairing token
  pair_hello_ack:
    from: backend
    to: client
    desc: ECDH pubkey
  pair_confirm:
    from: backend
    to: client
    desc: signal to compute and display code
  pair_complete:
    from: backend
    to: client
    desc: encrypted device secret
  auth_request:
    from: client
    to: backend
    desc: encrypted auth with nonce
  auth_ok:
    from: backend
    to: client
    desc: session established

  # --- Phase 2: Transport ---
  lan_offer:
    from: backend
    to: client
    desc: 'LAN address + challenge (sent via relay)'
  lan_verify:
    from: client
    to: backend
    desc: 'challenge response + instance ID (sent via LAN)'
  lan_confirm:
    from: backend
    to: client
    desc: 'LAN verified, path is live (sent via LAN)'
  path_ping:
    from: backend
    to: client
    desc: 'health check on active direct path'
  path_pong:
    from: client
    to: backend
    desc: 'health check response'

# Declared events — trigger transitions from application or I/O layer.
# Events replace free-form internal strings with declared identifiers.
# Phases 1+2 events are listed; Phase 2 (transport) events are the
# primary focus for T18 executor integration.
events:
  # --- Phase 2: Transport (application surface) ---
  app_send: 'application wants to send a message'
  app_recv: 'application wants to receive a message'
  app_send_datagram: 'application wants to send a datagram'
  app_recv_datagram: 'application wants to receive a datagram'
  app_close: 'application wants to close the connection'

  # --- Phase 2: Transport (I/O surface) ---
  relay_stream_data: 'data received on relay stream'
  relay_stream_error: 'error reading relay stream'
  relay_datagram: 'datagram received on relay'
  lan_stream_data: 'data received on LAN stream'
  lan_stream_error: 'error reading LAN stream'
  lan_datagram: 'datagram received on LAN'
  lan_dial_ok: 'LAN dial succeeded'
  lan_dial_failed: 'LAN dial failed'
  lan_verify_ok: 'LAN verification succeeded (server side)'
  ping_timeout: 'health ping timed out (no pong)'
  ping_tick: 'health ping timer fired'
  backoff_expired: 'backoff timer expired'
  offer_timeout: 'LAN offer timed out with no verification'

# Declared commands — emitted by transitions for the executor.
# The executor carries out these commands as I/O operations or
# resource lifecycle management. The machine never does I/O directly.
commands:
  # I/O operations.
  write_active_stream: 'write data to the currently active path stream'
  send_active_datagram: 'send datagram on the currently active path'
  send_path_ping: 'send health ping on direct path'
  send_path_pong: 'send health pong on direct path'
  send_lan_offer: 'send LAN offer via relay control channel'
  send_lan_verify: 'send LAN verification on direct connection'
  send_lan_confirm: 'send LAN confirmation on direct connection'
  dial_lan: 'initiate LAN connection to offered address'

  # Deliver to application.
  deliver_recv: 'deliver received data to blocked Recv() caller'
  deliver_recv_datagram: 'deliver received datagram to blocked RecvDatagram() caller'

  # Resource lifecycle.
  start_lan_stream_reader: 'start goroutine reading from LAN stream'
  stop_lan_stream_reader: 'stop LAN stream reader goroutine'
  start_lan_dg_reader: 'start goroutine reading from LAN datagrams'
  stop_lan_dg_reader: 'stop LAN datagram reader goroutine'
  start_monitor: 'start health ping timer for direct path'
  stop_monitor: 'stop health ping timer'
  start_backoff_timer: 'start exponential backoff timer'
  close_lan_path: 'close the LAN path resources'

  # Notifications.
  signal_lan_ready: 'close the LANReady channel (LAN active)'
  reset_lan_ready: 'create a new LANReady channel (LAN inactive)'

  # Encryption mode.
  set_crypto_datagram: 'switch crypto channels to datagram mode'

actors:
  backend:
    initial: Idle
    transitions:
      # ============================================================
      # Phase 1: Pairing
      # ============================================================

      # Backend initiates pairing (triggered by local CLI).
      - from: Idle
        to: GenerateToken
        on: cli_init_pair
        do: generate_token
        updates:
          current_token: '"tok_1"'
          active_tokens: 'active_tokens \union {"tok_1"}'

      - from: GenerateToken
        to: RegisterRelay
        on: token_created
        do: register_relay

      - from: RegisterRelay
        to: WaitingForClient
        on: relay_registered
        updates:
          # Token published via backchannel (QR code, NFC, etc.).
          secret_published: 'TRUE'

      - from: WaitingForClient
        to: DeriveSecret
        on: recv pair_hello
        guard: token_valid
        do: derive_secret
        updates:
          received_client_pub: recv_msg.pubkey
          backend_ecdh_pub: '"backend_pub"'
          backend_shared_key: 'DeriveKey("backend_pub", recv_msg.pubkey)'
          backend_code: 'DeriveCode("backend_pub", recv_msg.pubkey)'

      - from: WaitingForClient
        to: Idle
        on: recv pair_hello
        guard: token_invalid

      - from: DeriveSecret
        to: SendAck
        on: ecdh_complete
        sends:
          - to: client
            msg: pair_hello_ack
            fields:
              pubkey: backend_ecdh_pub

      - from: SendAck
        to: WaitingForCode
        on: signal_code_display
        sends:
          - to: client
            msg: pair_confirm

      # Code entry is a local backend action (CLI prompt).
      - from: WaitingForCode
        to: ValidateCode
        on: cli_code_entered
        updates:
          received_code: cli_entered_code

      - from: ValidateCode
        to: StorePaired
        on: check_code
        guard: code_correct

      - from: ValidateCode
        to: Idle
        on: check_code
        guard: code_wrong
        updates:
          code_attempts: code_attempts + 1

      - from: StorePaired
        to: Paired
        on: finalise
        do: store_device
        sends:
          - to: client
            msg: pair_complete
            fields:
              key: backend_shared_key
              secret: '"dev_secret_1"'
        updates:
          device_secret: '"dev_secret_1"'
          paired_devices: 'paired_devices \union {"device_1"}'
          active_tokens: 'active_tokens \ {current_token}'
          used_tokens: 'used_tokens \union {current_token}'

      - from: Paired
        to: AuthCheck
        on: recv auth_request
        updates:
          received_device_id: recv_msg.device_id
          received_auth_nonce: recv_msg.nonce

      - from: AuthCheck
        to: SessionActive
        on: verify
        guard: device_known
        do: verify_device
        sends:
          - to: client
            msg: auth_ok
        updates:
          auth_nonces_used: 'auth_nonces_used \union {received_auth_nonce}'

      - from: AuthCheck
        to: Idle
        on: verify
        guard: device_unknown

      # ============================================================
      # Phase 1 → Phase 2 bridge
      # ============================================================
      - from: SessionActive
        to: RelayConnected
        on: session_established

      # ============================================================
      # Phase 2: Transport management
      # ============================================================

      # App I/O — self-loop transitions that route to the active path.
      # These exist on every transport state where the app can send/recv.
      # Streams:
      - from: RelayConnected
        to: RelayConnected
        on: app_send
        emits: [write_active_stream]
      - from: RelayConnected
        to: RelayConnected
        on: relay_stream_data
        emits: [deliver_recv]
      - from: LANOffered
        to: LANOffered
        on: app_send
        emits: [write_active_stream]
      - from: LANOffered
        to: LANOffered
        on: relay_stream_data
        emits: [deliver_recv]
      - from: LANActive
        to: LANActive
        on: app_send
        emits: [write_active_stream]
      - from: LANActive
        to: LANActive
        on: lan_stream_data
        emits: [deliver_recv]
      - from: LANActive
        to: LANActive
        on: relay_stream_data
        emits: [deliver_recv]
      - from: LANDegraded
        to: LANDegraded
        on: app_send
        emits: [write_active_stream]
      - from: LANDegraded
        to: LANDegraded
        on: lan_stream_data
        emits: [deliver_recv]
      - from: LANDegraded
        to: LANDegraded
        on: relay_stream_data
        emits: [deliver_recv]
      - from: RelayBackoff
        to: RelayBackoff
        on: app_send
        emits: [write_active_stream]
      - from: RelayBackoff
        to: RelayBackoff
        on: relay_stream_data
        emits: [deliver_recv]
      # Datagrams:
      - from: RelayConnected
        to: RelayConnected
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: RelayConnected
        to: RelayConnected
        on: relay_datagram
        emits: [deliver_recv_datagram]
      - from: LANOffered
        to: LANOffered
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: LANOffered
        to: LANOffered
        on: relay_datagram
        emits: [deliver_recv_datagram]
      - from: LANActive
        to: LANActive
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: LANActive
        to: LANActive
        on: lan_datagram
        emits: [deliver_recv_datagram]
      - from: LANActive
        to: LANActive
        on: relay_datagram
        emits: [deliver_recv_datagram]
      - from: LANDegraded
        to: LANDegraded
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: LANDegraded
        to: LANDegraded
        on: lan_datagram
        emits: [deliver_recv_datagram]
      - from: LANDegraded
        to: LANDegraded
        on: relay_datagram
        emits: [deliver_recv_datagram]
      - from: RelayBackoff
        to: RelayBackoff
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: RelayBackoff
        to: RelayBackoff
        on: relay_datagram
        emits: [deliver_recv_datagram]

      - from: RelayConnected
        to: LANOffered
        on: lan_server_ready
        sends:
          - to: client
            msg: lan_offer
            fields:
              addr: lan_addr
              challenge: challenge_bytes
        emits: [send_lan_offer]

      - from: LANOffered
        to: LANActive
        on: recv lan_verify
        guard: challenge_valid
        do: activate_lan
        sends:
          - to: client
            msg: lan_confirm
        updates:
          ping_failures: '0'
          backoff_level: '0'
          b_active_path: '"lan"'
          b_dispatcher_path: '"lan"'
          monitor_target: '"lan"'
          lan_signal: '"ready"'
        emits:
          - send_lan_confirm
          - start_lan_stream_reader
          - start_lan_dg_reader
          - start_monitor
          - signal_lan_ready
          - set_crypto_datagram

      - from: LANOffered
        to: RelayConnected
        on: recv lan_verify
        guard: challenge_invalid

      - from: LANOffered
        to: RelayBackoff
        on: offer_timeout
        updates:
          backoff_level: 'Min(backoff_level + 1, max_backoff_level)'
          lan_signal: '"pending"'
        emits: [reset_lan_ready, start_backoff_timer]

      - from: LANActive
        to: LANActive
        on: ping_tick
        sends:
          - to: client
            msg: path_ping
        emits: [send_path_ping]

      - from: LANActive
        to: LANDegraded
        on: ping_timeout
        updates:
          ping_failures: '1'

      - from: LANDegraded
        to: LANDegraded
        on: ping_tick
        sends:
          - to: client
            msg: path_ping
        emits: [send_path_ping]

      - from: LANDegraded
        to: LANActive
        on: recv path_pong
        do: reset_failures
        updates:
          ping_failures: '0'

      - from: LANDegraded
        to: LANDegraded
        on: ping_timeout
        guard: under_max_failures
        updates:
          ping_failures: 'ping_failures + 1'

      - from: LANDegraded
        to: RelayBackoff
        on: ping_timeout
        guard: at_max_failures
        do: fallback_to_relay
        updates:
          backoff_level: 'Min(backoff_level + 1, max_backoff_level)'
          b_active_path: '"relay"'
          b_dispatcher_path: '"relay"'
          monitor_target: '"none"'
          lan_signal: '"pending"'
          ping_failures: '0'
        emits:
          - stop_monitor
          - stop_lan_stream_reader
          - stop_lan_dg_reader
          - close_lan_path
          - reset_lan_ready
          - start_backoff_timer

      - from: RelayBackoff
        to: LANOffered
        on: backoff_expired
        fairness: strong
        sends:
          - to: client
            msg: lan_offer
            fields:
              addr: lan_addr
              challenge: challenge_bytes

      - from: RelayBackoff
        to: LANOffered
        on: lan_server_changed
        sends:
          - to: client
            msg: lan_offer
            fields:
              addr: lan_addr
              challenge: challenge_bytes
        updates:
          backoff_level: '0'

      - from: RelayConnected
        to: LANOffered
        on: readvertise_tick
        guard: lan_server_available
        sends:
          - to: client
            msg: lan_offer
            fields:
              addr: lan_addr
              challenge: challenge_bytes

      # Re-enter pairing on disconnect.
      - from: RelayConnected
        to: Paired
        on: disconnect

  client:
    initial: Idle
    transitions:
      # ============================================================
      # Phase 1: Pairing
      # ============================================================

      - from: Idle
        to: ObtainBackchannelSecret
        on: backchannel_received

      - from: ObtainBackchannelSecret
        to: ConnectRelay
        on: secret_parsed

      - from: ConnectRelay
        to: GenKeyPair
        on: relay_connected

      - from: GenKeyPair
        to: WaitAck
        on: key_pair_generated
        do: send_pair_hello
        sends:
          - to: backend
            msg: pair_hello
            fields:
              token: current_token
              pubkey: '"client_pub"'

      - from: WaitAck
        to: E2EReady
        on: recv pair_hello_ack
        do: derive_secret
        updates:
          received_backend_pub: recv_msg.pubkey
          client_shared_key: 'DeriveKey("client_pub", recv_msg.pubkey)'

      - from: E2EReady
        to: ShowCode
        on: recv pair_confirm
        updates:
          client_code: 'DeriveCode(received_backend_pub, "client_pub")'

      - from: ShowCode
        to: WaitPairComplete
        on: code_displayed

      - from: WaitPairComplete
        to: Paired
        on: recv pair_complete
        do: store_secret

      - from: Paired
        to: Reconnect
        on: app_launch

      - from: Reconnect
        to: SendAuth
        on: relay_connected
        sends:
          - to: backend
            msg: auth_request
            fields:
              device_id: '"device_1"'
              secret: device_secret
              nonce: '"nonce_1"'
              key: client_shared_key

      - from: SendAuth
        to: SessionActive
        on: recv auth_ok

      # ============================================================
      # Phase 1 → Phase 2 bridge
      # ============================================================
      - from: SessionActive
        to: RelayConnected
        on: session_established

      # ============================================================
      # Phase 2: Transport management
      # ============================================================

      # App I/O — self-loop transitions that route to the active path.
      - from: RelayConnected
        to: RelayConnected
        on: app_send
        emits: [write_active_stream]
      - from: RelayConnected
        to: RelayConnected
        on: relay_stream_data
        emits: [deliver_recv]
      - from: LANConnecting
        to: LANConnecting
        on: app_send
        emits: [write_active_stream]
      - from: LANConnecting
        to: LANConnecting
        on: relay_stream_data
        emits: [deliver_recv]
      - from: LANVerifying
        to: LANVerifying
        on: app_send
        emits: [write_active_stream]
      - from: LANVerifying
        to: LANVerifying
        on: relay_stream_data
        emits: [deliver_recv]
      - from: LANActive
        to: LANActive
        on: app_send
        emits: [write_active_stream]
      - from: LANActive
        to: LANActive
        on: lan_stream_data
        emits: [deliver_recv]
      - from: LANActive
        to: LANActive
        on: relay_stream_data
        emits: [deliver_recv]
      - from: RelayFallback
        to: RelayFallback
        on: app_send
        emits: [write_active_stream]
      - from: RelayFallback
        to: RelayFallback
        on: relay_stream_data
        emits: [deliver_recv]
      # Datagrams:
      - from: RelayConnected
        to: RelayConnected
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: RelayConnected
        to: RelayConnected
        on: relay_datagram
        emits: [deliver_recv_datagram]
      - from: LANConnecting
        to: LANConnecting
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: LANConnecting
        to: LANConnecting
        on: relay_datagram
        emits: [deliver_recv_datagram]
      - from: LANVerifying
        to: LANVerifying
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: LANVerifying
        to: LANVerifying
        on: relay_datagram
        emits: [deliver_recv_datagram]
      - from: LANActive
        to: LANActive
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: LANActive
        to: LANActive
        on: lan_datagram
        emits: [deliver_recv_datagram]
      - from: LANActive
        to: LANActive
        on: relay_datagram
        emits: [deliver_recv_datagram]
      - from: RelayFallback
        to: RelayFallback
        on: app_send_datagram
        emits: [send_active_datagram]
      - from: RelayFallback
        to: RelayFallback
        on: relay_datagram
        emits: [deliver_recv_datagram]

      - from: RelayConnected
        to: LANConnecting
        on: recv lan_offer
        guard: lan_enabled
        do: dial_lan
        emits: [dial_lan]

      - from: RelayConnected
        to: RelayConnected
        on: recv lan_offer
        guard: lan_disabled

      - from: LANConnecting
        to: LANVerifying
        on: lan_dial_ok
        sends:
          - to: backend
            msg: lan_verify
            fields:
              challenge: offer_challenge
              instance_id: instance_id
        emits: [send_lan_verify]

      - from: LANConnecting
        to: RelayConnected
        on: lan_dial_failed

      - from: LANVerifying
        to: LANActive
        on: recv lan_confirm
        do: activate_lan
        updates:
          c_active_path: '"lan"'
          c_dispatcher_path: '"lan"'
          lan_signal: '"ready"'
        emits:
          - start_lan_stream_reader
          - start_lan_dg_reader
          - signal_lan_ready
          - set_crypto_datagram

      - from: LANVerifying
        to: RelayConnected
        on: verify_timeout
        updates:
          c_dispatcher_path: '"relay"'

      - from: LANActive
        to: LANActive
        on: recv path_ping
        sends:
          - to: backend
            msg: path_pong
        emits: [send_path_pong]

      - from: LANActive
        to: RelayFallback
        on: lan_error
        do: fallback_to_relay
        updates:
          c_active_path: '"relay"'
          c_dispatcher_path: '"relay"'
          lan_signal: '"pending"'
        emits:
          - stop_lan_stream_reader
          - stop_lan_dg_reader
          - close_lan_path
          - reset_lan_ready

      - from: RelayFallback
        to: RelayConnected
        on: relay_ok

      - from: LANActive
        to: LANConnecting
        on: recv lan_offer
        guard: lan_enabled
        do: dial_lan
        emits:
          - stop_lan_stream_reader
          - stop_lan_dg_reader
          - close_lan_path
          - dial_lan

      # Re-enter pairing on disconnect.
      - from: RelayConnected
        to: Paired
        on: disconnect

  relay:
    initial: Idle
    transitions:
      - from: Idle
        to: BackendRegistered
        on: backend_register

      - from: BackendRegistered
        to: Bridged
        on: client_connect
        do: bridge_streams
        updates:
          relay_bridge: '"active"'

      - from: Bridged
        to: BackendRegistered
        on: client_disconnect
        do: unbridge
        updates:
          relay_bridge: '"idle"'

      - from: BackendRegistered
        to: Idle
        on: backend_disconnect

structs:
  ECDHState:
    backend_pub:
      type: string
      initial: '""'
      desc: backend ECDH public key
    client_pub:
      type: string
      initial: '""'
      desc: pubkey received from client
    shared_key:
      type: string
      initial: '""'
      desc: ECDH-derived shared key
    code:
      type: string
      initial: '""'
      desc: confirmation code derived from pubkeys

  TokenState:
    current:
      type: string
      initial: '""'
      desc: pairing token currently in play
    active:
      type: set<string>
      initial: '{}'
      desc: set of valid (non-revoked) tokens
    used:
      type: set<string>
      initial: '{}'
      desc: set of revoked tokens

  BackendPathState:
    active_path:
      type: string
      initial: '"relay"'
      desc: which path carries traffic
    dispatcher_path:
      type: string
      initial: '"relay"'
      desc: datagram dispatcher binding
    monitor_target:
      type: string
      initial: '"none"'
      desc: health monitor target
    lan_signal:
      type: string
      initial: '"pending"'
      desc: LANReady notification state

  ClientPathState:
    active_path:
      type: string
      initial: '"relay"'
      desc: which path carries traffic
    dispatcher_path:
      type: string
      initial: '"relay"'
      desc: datagram dispatcher binding

vars:
  # --- Phase 1: Pairing ---
  current_token:
    type: string
    initial: '"none"'
    desc: pairing token currently in play
  active_tokens:
    type: set<string>
    initial: '{}'
    desc: set of valid (non-revoked) tokens
  used_tokens:
    type: set<string>
    initial: '{}'
    desc: set of revoked tokens
  backend_ecdh_pub:
    type: string
    initial: '"none"'
    desc: backend ECDH public key
  received_client_pub:
    type: string
    initial: '"none"'
    desc: pubkey backend received in pair_hello
  received_backend_pub:
    type: string
    initial: '"none"'
    desc: pubkey client received in pair_hello_ack
  backend_shared_key:
    type: string
    initial: '<<"none">>'
    desc: ECDH key derived by backend
  client_shared_key:
    type: string
    initial: '<<"none">>'
    desc: ECDH key derived by client
  backend_code:
    type: string
    initial: '<<"none">>'
    desc: code computed by backend
  client_code:
    type: string
    initial: '<<"none">>'
    desc: code computed by client
  received_code:
    type: string
    initial: '<<"none">>'
    desc: code entered via CLI
  cli_entered_code:
    type: string
    initial: '<<"none">>'
    desc: staging for CLI code input
  code_attempts:
    type: int
    initial: '0'
    desc: failed code submission attempts
  device_secret:
    type: string
    initial: '"none"'
    desc: persistent device secret
  paired_devices:
    type: set<string>
    initial: '{}'
    desc: device IDs that completed pairing
  received_device_id:
    type: string
    initial: '"none"'
    desc: device_id from auth_request
  auth_nonces_used:
    type: set<string>
    initial: '{}'
    desc: set of consumed auth nonces
  received_auth_nonce:
    type: string
    initial: '"none"'
    desc: nonce from auth_request
  secret_published:
    type: bool
    initial: 'FALSE'
    desc: whether token has been published via backchannel
  recv_msg:
    type: string
    initial: '[type |-> "none"]'
    desc: last received message (staging)

  # --- Adversary (Phase 1 only) ---
  adversary_keys:
    type: set<string>
    initial: '{}'
    desc: encryption keys the adversary knows
  adv_ecdh_pub:
    type: string
    initial: '"adv_pub"'
    desc: adversary's ECDH public key
  adv_saved_client_pub:
    type: string
    initial: '"none"'
    desc: real client pubkey saved during MitM
  adv_saved_server_pub:
    type: string
    initial: '"none"'
    desc: real backend pubkey saved during MitM

  # --- Phase 2: Transport ---
  lan_addr:
    type: string
    initial: '"none"'
    desc: LAN server address (host:port)
  challenge_bytes:
    type: string
    initial: '"none"'
    desc: 32-byte random challenge for LAN verification
  offer_challenge:
    type: string
    initial: '"none"'
    desc: challenge from the most recent LAN offer
  instance_id:
    type: string
    initial: '"none"'
    desc: relay instance ID
  ping_failures:
    type: int
    initial: '0'
    desc: consecutive failed pings
  max_ping_failures:
    type: int
    initial: '3'
    desc: threshold before fallback
  backoff_level:
    type: int
    initial: '0'
    desc: exponential backoff level
  max_backoff_level:
    type: int
    initial: '5'
    desc: backoff cap
  lan_server_addr:
    type: string
    initial: '"none"'
    desc: LAN server listen address

  # --- Resource lifecycle (Phase 2) ---
  b_active_path:
    type: string
    initial: '"relay"'
    desc: backend active path
  c_active_path:
    type: string
    initial: '"relay"'
    desc: client active path
  b_dispatcher_path:
    type: string
    initial: '"relay"'
    desc: backend datagram dispatcher binding
  c_dispatcher_path:
    type: string
    initial: '"relay"'
    desc: client datagram dispatcher binding
  monitor_target:
    type: string
    initial: '"none"'
    desc: health monitor target
  lan_signal:
    type: string
    initial: '"pending"'
    desc: LANReady notification state
  relay_bridge:
    type: string
    initial: '"idle"'
    desc: relay bridge state

guards:
  # Phase 1
  token_valid: 'recv_msg.token \in active_tokens'
  token_invalid: 'recv_msg.token \notin active_tokens'
  code_correct: received_code = backend_code
  code_wrong: received_code /= backend_code
  device_known: 'received_device_id \in paired_devices'
  device_unknown: 'received_device_id \notin paired_devices'
  nonce_fresh: 'received_auth_nonce \notin auth_nonces_used'
  # Phase 2
  challenge_valid: 'offer_challenge = challenge_bytes'
  challenge_invalid: 'offer_challenge /= challenge_bytes'
  lan_enabled: 'TRUE'
  lan_disabled: 'FALSE'
  lan_server_available: 'lan_server_addr /= "none"'
  under_max_failures: 'ping_failures + 1 < max_ping_failures'
  at_max_failures: 'ping_failures + 1 >= max_ping_failures'

operators:
  KeyRank:
    params: k
    expr: 'CASE k = "adv_pub" -> 0 [] k = "client_pub" -> 1 [] k = "backend_pub" -> 2 [] OTHER -> 3'
    desc: deterministic ordering for ECDH
  DeriveKey:
    params: a, b
    expr: 'IF KeyRank(a) <= KeyRank(b) THEN <<"ecdh", a, b>> ELSE <<"ecdh", b, a>>'
    desc: symbolic ECDH
  DeriveCode:
    params: a, b
    expr: 'IF KeyRank(a) <= KeyRank(b) THEN <<"code", a, b>> ELSE <<"code", b, a>>'
    desc: confirmation code from pubkeys
  Min:
    params: a, b
    expr: 'IF a < b THEN a ELSE b'
    desc: minimum of two values

# Phases group states for hierarchical diagramming and TLA+ splitting.
# The names here become PlantUML superstates. For TLA+ export, each
# phase generates an independent spec with only its relevant variables.
phases:
  Pairing:
    states:
      # Backend pairing states
      - Idle
      - GenerateToken
      - RegisterRelay
      - WaitingForClient
      - DeriveSecret
      - SendAck
      - WaitingForCode
      - ValidateCode
      - StorePaired
      - Paired
      - AuthCheck
      - SessionActive
      # Client pairing states
      - ObtainBackchannelSecret
      - ConnectRelay
      - GenKeyPair
      - WaitAck
      - E2EReady
      - ShowCode
      - WaitPairComplete
      - Reconnect
      - SendAuth
    vars:
      - current_token
      - active_tokens
      - used_tokens
      - backend_ecdh_pub
      - received_client_pub
      - received_backend_pub
      - backend_shared_key
      - client_shared_key
      - backend_code
      - client_code
      - received_code
      - cli_entered_code
      - code_attempts
      - device_secret
      - paired_devices
      - received_device_id
      - auth_nonces_used
      - received_auth_nonce
      - secret_published
      - recv_msg
      - adversary_keys
      - adv_ecdh_pub
      - adv_saved_client_pub
      - adv_saved_server_pub
    adversary: true
  Transport:
    states:
      # Backend transport states
      - RelayConnected
      - LANOffered
      - LANActive
      - LANDegraded
      - RelayBackoff
      # Client transport states
      - LANConnecting
      - LANVerifying
      - RelayFallback
    vars:
      - lan_addr
      - challenge_bytes
      - offer_challenge
      - instance_id
      - ping_failures
      - max_ping_failures
      - backoff_level
      - max_backoff_level
      - lan_server_addr
      - b_active_path
      - c_active_path
      - b_dispatcher_path
      - c_dispatcher_path
      - monitor_target
      - lan_signal
    adversary: false

# The adversary is only active during the pairing phase. Once the
# backend reaches transport states, the adversary self-disables.
# This prevents combinatorial explosion from adversary interleavings
# with transport events that can never interact with pairing.
adversary_guard: 'backend_state \notin {backend_RelayConnected, backend_LANOffered, backend_LANActive, backend_LANDegraded, backend_RelayBackoff}'

adversary:
  - name: QR_shoulder_surf
    desc: observe QR code content
    code: |
      await current_token /= "none";
      adversary_knowledge := adversary_knowledge \union {[type |-> "qr_token", token |-> current_token]};
  - name: MitM_pair_hello
    desc: intercept pair_hello and substitute adversary pubkey
    code: |
      await Len(chan_client_backend) > 0 /\ Head(chan_client_backend).type = MSG_pair_hello;
      adv_saved_client_pub := Head(chan_client_backend).pubkey;
      chan_client_backend := <<[type |-> MSG_pair_hello, token |-> Head(chan_client_backend).token, pubkey |-> adv_ecdh_pub]>> \o Tail(chan_client_backend);
  - name: MitM_pair_hello_ack
    desc: intercept pair_hello_ack and substitute adversary pubkey
    code: |
      await Len(chan_backend_client) > 0 /\ Head(chan_backend_client).type = MSG_pair_hello_ack;
      adv_saved_server_pub := Head(chan_backend_client).pubkey;
      adversary_keys := adversary_keys \union {DeriveKey(adv_ecdh_pub, adv_saved_server_pub), DeriveKey(adv_ecdh_pub, adv_saved_client_pub)};
      chan_backend_client := <<[type |-> MSG_pair_hello_ack, pubkey |-> adv_ecdh_pub]>> \o Tail(chan_backend_client);
  - name: MitM_reencrypt_secret
    desc: decrypt pair_complete with MitM key
    code: |
      await Len(chan_backend_client) > 0 /\ Head(chan_backend_client).type = MSG_pair_complete /\ Head(chan_backend_client).key \in adversary_keys;
      with msg = Head(chan_backend_client) do
        adversary_knowledge := adversary_knowledge \union {[type |-> "plaintext_secret", secret |-> msg.secret]};
        chan_backend_client := <<[type |-> MSG_pair_complete, key |-> DeriveKey(adv_ecdh_pub, adv_saved_client_pub), secret |-> msg.secret]>> \o Tail(chan_backend_client);
      end with;
  - name: concurrent_pair
    desc: race a forged pair_hello using shoulder-surfed token
    code: |
      await \E m \in adversary_knowledge : m = [type |-> "qr_token", token |-> current_token];
      await Len(chan_client_backend) < 3;
      chan_client_backend := Append(chan_client_backend, [type |-> MSG_pair_hello, token |-> current_token, pubkey |-> adv_ecdh_pub]);
  - name: token_bruteforce
    desc: send pair_hello with fabricated token
    code: |
      await Len(chan_client_backend) < 3;
      chan_client_backend := Append(chan_client_backend, [type |-> MSG_pair_hello, token |-> "fake_token", pubkey |-> adv_ecdh_pub]);
  - name: code_guess
    desc: submit fabricated confirmation code
    code: |
      await backend_state = backend_WaitingForCode;
      cli_entered_code := <<"guess", "000000">>;
  - name: session_replay
    desc: replay captured auth_request with stale nonce
    code: |
      await Len(chan_client_backend) < 3;
      await \E m \in adversary_knowledge : m.type = MSG_auth_request;
      with msg \in {m \in adversary_knowledge : m.type = MSG_auth_request} do
        chan_client_backend := Append(chan_client_backend, msg);
      end with;

constants:
  - name: Challenges
    type: set<string>
    values: [c1, c2]
    desc: possible challenge values (verifies protocol works for any challenge)

properties:
  # --- Phase 1: Security ---
  - name: NoTokenReuse
    kind: invariant
    expr: 'used_tokens \intersect active_tokens = {}'
    desc: A revoked pairing token is never accepted again
  - name: MitMDetectedByCodeMismatch
    kind: invariant
    expr: '(backend_shared_key \in adversary_keys /\ backend_code /= <<"none">> /\ client_code /= <<"none">>) => backend_code /= client_code'
    desc: MitM produces mismatched codes
  - name: MitMPrevented
    kind: invariant
    expr: 'backend_shared_key \in adversary_keys => backend_state \notin {backend_StorePaired, backend_Paired, backend_AuthCheck, backend_SessionActive}'
    desc: Compromised key prevents pairing completion
  - name: AuthRequiresCompletedPairing
    kind: invariant
    expr: 'backend_state = backend_SessionActive => received_device_id \in paired_devices'
    desc: Session requires completed pairing
  - name: NoNonceReuse
    kind: invariant
    expr: 'backend_state = backend_SessionActive => received_auth_nonce \notin (auth_nonces_used \ {received_auth_nonce})'
    desc: Each auth nonce accepted at most once
  - name: DeviceSecretSecrecy
    kind: invariant
    expr: '\A m \in adversary_knowledge : "type" \in DOMAIN m => m.type /= "plaintext_secret"'
    desc: Adversary never learns device secret

  # --- Phase 2: Transport ---
  - name: PathConsistency
    kind: invariant
    expr: 'b_active_path \in {"relay", "lan"} /\ c_active_path \in {"relay", "lan"}'
    desc: Paths are always valid
  - name: BackoffBounded
    kind: invariant
    expr: 'backoff_level <= max_backoff_level'
    desc: Backoff never exceeds cap
  - name: BackoffResetsOnSuccess
    kind: invariant
    expr: 'backend_state = backend_LANActive => backoff_level = 0'
    desc: LAN success resets backoff

  # --- Resource lifecycle ---
  - name: DispatcherAlwaysBound
    kind: invariant
    expr: 'b_dispatcher_path \in {"relay", "lan"} /\ c_dispatcher_path \in {"relay", "lan"}'
    desc: Dispatchers always bound to valid path
  - name: BackendDispatcherMatchesActive
    kind: invariant
    expr: 'backend_state = backend_LANActive => b_dispatcher_path = "lan"'
    desc: Backend dispatcher on LAN when LAN active
  - name: ClientDispatcherMatchesActive
    kind: invariant
    expr: 'client_state = client_LANActive => c_dispatcher_path = "lan"'
    desc: Client dispatcher on LAN when LAN active
  - name: MonitorOnlyWhenLAN
    kind: invariant
    expr: 'monitor_target = "lan" => backend_state \in {backend_LANActive, backend_LANDegraded}'
    desc: Monitor only pings when LAN is active/degraded
  # LANSignalPendingOnFallback removed: lan_signal is shared between
  # actors but updated independently, creating valid states where the
  # backend has fallen back but the client hasn't reset the signal yet.
  # In the Go implementation, each Conn has its own lanReady channel.

  # --- Leads-to (progress guarantees) ---
  - name: FallbackLeadsToReadvertise
    kind: leads_to
    from_expr: 'backend_state = backend_RelayBackoff'
    to_expr: 'backend_state = backend_LANOffered'
    desc: After fallback, backend eventually re-advertises LAN
  - name: DegradedLeadsToResolutionOrFallback
    kind: leads_to
    from_expr: 'backend_state = backend_LANDegraded'
    to_expr: 'backend_state \in {backend_LANActive, backend_RelayBackoff}'
    desc: Degraded state eventually resolves (recovery or fallback)
