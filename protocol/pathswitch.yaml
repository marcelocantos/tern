# Path-switching protocol definition.
# Manages transport path lifecycle after pairing is complete:
# relay (permanent baseline), LAN (direct), and future STUN paths.
#
# Three actors: backend, client, relay.
# The relay is always connected. Direct paths come and go.
# Traffic flows through the best healthy path at all times.
#
# This state machine is the COMPLETE specification of a correctly
# running system. All resource lifecycle (dispatcher bindings, monitor
# targets, signal state) is modelled as state variables. The Go/Swift/
# Kotlin/TypeScript executors are mechanical: execute the transition,
# diff the state, rebind any changed resources. No independent logic.
#
# Retry strategy: exponential backoff with jitter on re-establishment
# attempts. Health pings are fixed-interval (no backoff).

name: PathSwitch
one_shot: false
channel_bound: 3

messages:
  lan_offer:
    from: backend
    to: client
    desc: 'LAN address + challenge (sent via relay)'
  lan_verify:
    from: client
    to: backend
    desc: 'challenge response + instance ID (sent via LAN)'
  lan_confirm:
    from: backend
    to: client
    desc: 'LAN verified, path is live (sent via LAN)'
  path_ping:
    from: backend
    to: client
    desc: 'health check on active direct path'
  path_pong:
    from: client
    to: backend
    desc: 'health check response'
  relay_resume:
    from: client
    to: relay
    desc: 'client reconnects relay stream after direct path failure'
  relay_resumed:
    from: relay
    to: client
    desc: 'relay confirms stream is re-bridged'

actors:
  backend:
    initial: RelayConnected
    transitions:
      # --- LAN advertisement ---
      - from: RelayConnected
        to: LANOffered
        on: lan_server_ready
        sends:
          - to: client
            msg: lan_offer
            fields:
              addr: lan_addr
              challenge: challenge_bytes

      # --- LAN verification ---
      - from: LANOffered
        to: LANActive
        on: recv lan_verify
        guard: challenge_valid
        do: activate_lan
        sends:
          - to: client
            msg: lan_confirm
        updates:
          ping_failures: '0'
          backoff_level: '0'
          active_path: '"lan"'
          monitor_target: '"lan"'
          dispatcher_path: '"lan"'
          lan_signal: '"ready"'

      - from: LANOffered
        to: RelayConnected
        on: recv lan_verify
        guard: challenge_invalid

      - from: LANOffered
        to: RelayBackoff
        on: offer_timeout
        updates:
          backoff_level: 'Min(backoff_level + 1, max_backoff_level)'

      # --- Health monitoring (fixed interval, no backoff) ---
      - from: LANActive
        to: LANActive
        on: ping_tick
        sends:
          - to: client
            msg: path_ping

      - from: LANActive
        to: LANDegraded
        on: ping_timeout
        updates:
          ping_failures: '1'

      - from: LANDegraded
        to: LANDegraded
        on: ping_tick
        sends:
          - to: client
            msg: path_ping

      - from: LANDegraded
        to: LANActive
        on: recv path_pong
        do: reset_failures
        updates:
          ping_failures: '0'

      - from: LANDegraded
        to: LANDegraded
        on: ping_timeout
        guard: under_max_failures
        updates:
          ping_failures: 'ping_failures + 1'

      - from: LANDegraded
        to: RelayBackoff
        on: ping_timeout
        guard: at_max_failures
        do: fallback_to_relay
        updates:
          backoff_level: 'Min(backoff_level + 1, max_backoff_level)'
          active_path: '"relay"'
          monitor_target: '"none"'
          dispatcher_path: '"relay"'
          lan_signal: '"pending"'
          ping_failures: '0'

      # --- Backoff before re-advertisement ---
      - from: RelayBackoff
        to: LANOffered
        on: backoff_expired
        sends:
          - to: client
            msg: lan_offer
            fields:
              addr: lan_addr
              challenge: challenge_bytes

      - from: RelayBackoff
        to: LANOffered
        on: lan_server_changed
        sends:
          - to: client
            msg: lan_offer
            fields:
              addr: lan_addr
              challenge: challenge_bytes
        updates:
          backoff_level: '0'

      # --- Re-advertisement from clean relay state ---
      - from: RelayConnected
        to: LANOffered
        on: readvertise_tick
        guard: lan_server_available
        sends:
          - to: client
            msg: lan_offer
            fields:
              addr: lan_addr
              challenge: challenge_bytes

  client:
    initial: RelayConnected
    transitions:
      # --- LAN offer handling ---
      - from: RelayConnected
        to: LANConnecting
        on: recv lan_offer
        guard: lan_enabled
        do: dial_lan

      - from: RelayConnected
        to: RelayConnected
        on: recv lan_offer
        guard: lan_disabled

      - from: LANConnecting
        to: LANVerifying
        on: lan_dial_ok
        sends:
          - to: backend
            msg: lan_verify
            fields:
              challenge: offer_challenge
              instance_id: instance_id

      - from: LANConnecting
        to: RelayConnected
        on: lan_dial_failed

      # --- LAN confirmation ---
      - from: LANVerifying
        to: LANActive
        on: recv lan_confirm
        do: activate_lan
        updates:
          active_path: '"lan"'
          dispatcher_path: '"lan"'
          lan_signal: '"ready"'

      - from: LANVerifying
        to: RelayConnected
        on: verify_timeout
        updates:
          dispatcher_path: '"relay"'

      # --- Health monitoring ---
      - from: LANActive
        to: LANActive
        on: recv path_ping
        sends:
          - to: backend
            msg: path_pong

      - from: LANActive
        to: RelayFallback
        on: lan_error
        do: fallback_to_relay
        updates:
          active_path: '"relay"'
          dispatcher_path: '"relay"'
          lan_signal: '"pending"'

      # --- Relay fallback ---
      - from: RelayFallback
        to: RelayConnected
        on: relay_ok

      # --- Accept new LAN offers while on LAN (address change) ---
      - from: LANActive
        to: LANConnecting
        on: recv lan_offer
        guard: lan_enabled
        do: dial_lan

  relay:
    initial: Idle
    transitions:
      - from: Idle
        to: BackendRegistered
        on: backend_register

      - from: BackendRegistered
        to: Bridged
        on: client_connect
        do: bridge_streams
        updates:
          relay_bridge: '"active"'

      - from: Bridged
        to: BackendRegistered
        on: client_disconnect
        do: unbridge
        updates:
          relay_bridge: '"idle"'

      - from: Bridged
        to: Bridged
        on: recv relay_resume
        do: rebridge_streams
        sends:
          - to: client
            msg: relay_resumed

      - from: BackendRegistered
        to: Idle
        on: backend_disconnect

vars:
  lan_addr:
    initial: '"none"'
    desc: LAN server address (host:port)
  challenge_bytes:
    initial: '"none"'
    desc: 32-byte random challenge for LAN verification
  offer_challenge:
    initial: '"none"'
    desc: challenge from the most recent LAN offer
  instance_id:
    initial: '"none"'
    desc: relay instance ID of this peer
  ping_failures:
    type: int
    initial: '0'
    desc: consecutive failed pings on the direct path
  max_ping_failures:
    type: int
    initial: '3'
    desc: threshold before fallback
  backoff_level:
    type: int
    initial: '0'
    desc: current exponential backoff level (0 = no backoff)
  max_backoff_level:
    type: int
    initial: '5'
    desc: 'cap on backoff level (2^5 * base = 32x base interval)'

  # --- Resource lifecycle state ---
  # These variables track which path each resource is bound to.
  # Transitions that change paths MUST update these. The executor
  # diffs the state and rebinds any changed resources.
  active_path:
    initial: '"relay"'
    desc: '"relay" or "lan" — which path carries application traffic'
  dispatcher_path:
    initial: '"relay"'
    desc: 'which path the datagram dispatcher reads from ("relay", "lan", "none")'
  monitor_target:
    initial: '"none"'
    desc: 'which path the health monitor pings ("lan", "none")'
  lan_signal:
    initial: '"pending"'
    desc: 'LANReady notification state ("pending" = not yet, "ready" = closed/signalled)'
  relay_bridge:
    initial: '"idle"'
    desc: 'relay bridge state ("active" = bridging, "idle" = backend registered but no client)'
  lan_server_addr:
    initial: '"none"'
    desc: LAN server listen address (backend only)

guards:
  challenge_valid: 'offer_challenge = challenge_bytes'
  challenge_invalid: 'offer_challenge /= challenge_bytes'
  lan_enabled: 'TRUE'
  lan_disabled: 'FALSE'
  lan_server_available: 'lan_server_addr /= "none"'
  under_max_failures: 'ping_failures + 1 < max_ping_failures'
  at_max_failures: 'ping_failures + 1 >= max_ping_failures'

properties:
  - name: RelayAlwaysAvailable
    kind: invariant
    expr: 'relay_state \in {relay_BackendRegistered, relay_Bridged}'
    desc: The relay registration is never lost while the session is active
  - name: PathConsistency
    kind: invariant
    expr: 'active_path \in {"relay", "lan"}'
    desc: Traffic flows through exactly one valid path
  - name: LANRequiresVerification
    kind: invariant
    expr: '(backend_state = backend_LANActive /\ client_state = client_LANActive) => challenge_bytes = offer_challenge'
    desc: LAN path is only active after successful challenge verification
  - name: BackoffBounded
    kind: invariant
    expr: 'backoff_level <= max_backoff_level'
    desc: Backoff level never exceeds the cap
  - name: BackoffResetsOnSuccess
    kind: invariant
    expr: 'backend_state = backend_LANActive => backoff_level = 0'
    desc: Successful LAN establishment resets the backoff level
  - name: DispatcherAlwaysBound
    kind: invariant
    expr: 'dispatcher_path \in {"relay", "lan"}'
    desc: The datagram dispatcher is always reading from a valid path
  - name: DispatcherMatchesActivePath
    kind: invariant
    expr: '(backend_state = backend_LANActive \/ client_state = client_LANActive) => dispatcher_path = "lan"'
    desc: When LAN is active, the dispatcher reads from LAN
  - name: DispatcherRelayOnFallback
    kind: invariant
    expr: '(backend_state = backend_RelayBackoff \/ client_state = client_RelayFallback) => dispatcher_path = "relay"'
    desc: After fallback, the dispatcher reads from relay
  - name: MonitorOnlyWhenLANActive
    kind: invariant
    expr: 'monitor_target = "lan" => backend_state \in {backend_LANActive, backend_LANDegraded}'
    desc: Health monitor only pings when LAN is active or degraded
  - name: MonitorOffOnFallback
    kind: invariant
    expr: 'backend_state = backend_RelayBackoff => monitor_target = "none"'
    desc: Health monitor stops on fallback
  - name: LANSignalReady
    kind: invariant
    expr: '(backend_state = backend_LANActive /\ lan_signal = "ready") => active_path = "lan"'
    desc: LANReady signal is only "ready" when LAN is the active path
  - name: LANSignalPendingOnFallback
    kind: invariant
    expr: 'backend_state = backend_RelayBackoff => lan_signal = "pending"'
    desc: LANReady resets to pending on fallback
