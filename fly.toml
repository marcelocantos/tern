app = "tern"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  XDG_DATA_HOME = "/data/certmagic"
  QUIC_PORT = "4433"

[processes]
  app = "/tern --domain tern.fly.dev --acme-email marcelo@cantos.id.au"

# WebTransport (browsers) on port 443
[[services]]
  internal_port = 443
  protocol = "udp"
  processes = ["app"]

  [[services.ports]]
    port = 443

[[services]]
  internal_port = 443
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    port = 443

# Raw QUIC (native clients) on port 4433
[[services]]
  internal_port = 4433
  protocol = "udp"
  processes = ["app"]

  [[services.ports]]
    port = 4433

[mounts]
  source = "certdata"
  destination = "/data/certmagic"
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
