app = "pigeon"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  XDG_DATA_HOME = "/data/certmagic"
  QUIC_PORT = "4433"

[processes]
  app = "/tern --domain tern.fly.dev --acme-email marcelo@cantos.id.au"

# TCP on port 443 — serves ACME TLS-ALPN-01, HTTPS /health, and
# Alt-Svc headers. Also acts as the auto-start wake trigger: Fly's
# proxy can only start stopped machines via TCP, not UDP.
[[services]]
  internal_port = 443
  protocol = "tcp"
  auto_start_machines = true
  auto_stop_machines = "stop"
  processes = ["app"]

  [[services.ports]]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"

# WebTransport (browsers) on UDP port 443 — QUIC/HTTP3.
[[services]]
  internal_port = 443
  protocol = "udp"
  processes = ["app"]

  [[services.ports]]
    port = 443

# Raw QUIC (native clients) on UDP port 4433.
[[services]]
  internal_port = 4433
  protocol = "udp"
  processes = ["app"]

  [[services.ports]]
    port = 4433

[mounts]
  source = "certdata"
  destination = "/data/certmagic"
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
