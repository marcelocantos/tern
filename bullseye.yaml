  T6.2:
    name: LAN direct WebTransport with cert fingerprint
    status: identified
    value: 3.0
    cost: 3.0
    acceptance:
    - Ephemeral self-signed cert for LAN listener
    - SHA-256 hash in LAN offer control message
    - Browser peers use serverCertificateHashes
    context: 'Cert generation exists (lan.go:239 generateSelfSigned, ephemeral ECDSA P256), but the lanOffer struct (lan.go:210) currently carries only Addr and Challenge — no SHA-256 hash field. The web client already accepts serverCertificateHashes in ConnectOptions (web/src/relay.ts:5-13). Missing piece is end-to-end: compute cert DER SHA-256 in LANServer.registerConn, add CertHash field to lanOffer, propagate through the lan_offer message in protocol/pathswitch.yaml, and extract it on the web side when dialling WebTransport direct. Also: the current LAN listener uses raw QUIC with ALPN "pigeon-lan" (lan.go:73), which browsers cannot speak natively — T6.2 also requires the LAN listener to accept WebTransport, either exclusively or alongside raw QUIC. Reparented from retired T6.'
    depends_on:
    - T6.1
    origin: bootstrap from targets.md (T8.5)
    discovered: 2026-04-08
  T7:
    name: Browser WebTransport E2E
    status: identified
    value: 3.0
    cost: 3.0
    acceptance:
    - Browser WebTransport path works end-to-end against relay
    - Automated or documented manual verification process
    context: 'web/e2e/relay.spec.ts has Playwright tests against headless Chromium covering register, bidirectional stream round-trip, datagrams, and encrypted stream round-trip. Tests work locally when PIGEON_TOKEN is set against a live relay, but skip in CI because no token is wired. Headless Chromium WebTransport works fine — the original "blocked on Playwright Chromium QUIC support" context is stale. Gap is not test existence, it''s making them runnable unattended: (a) spin up a local relay in the Playwright global setup (likely cleanest; pigeon-bridge prototype already exists), (b) wire a PIGEON_TOKEN CI secret pointing at a test relay, or (c) document the manual token-based run as the "documented manual verification" branch of the acceptance. Option (a) would make this target close naturally.'
    origin: bootstrap from targets.md (T14)
    discovered: 2026-04-08
  T8:
    name: Gomobile bindings for iOS and Android
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - iOS XCFramework importable from Swift
    - Android AAR importable from Kotlin
    - Go QUIC stack used by native apps
    context: 'The current iOS library (Sources/Pigeon/*.swift) and Android library (android/pigeon/src/main/kotlin/**) are HAND-WRITTEN ports of pigeon''s crypto, pairing, and path-switch state machines against platform crypto APIs — they do not share code with the Go implementation. T8 is a replacement strategy: use gomobile to bind pigeon''s Go code into an XCFramework (iOS) and AAR (Android), so native apps consume exactly the same QUIC stack, crypto, and state machine the Go server uses. This eliminates Network.framework quirks on iOS and removes the Android runtime''s dependency on Kotlin/JDK 17+ X25519 support. Would obsolete the hand-written Swift/Kotlin ports (or relegate them to thin façades). Decision point before starting: commit to gomobile as the canonical mobile path, or keep hand-written ports for ergonomic Swift/Kotlin APIs and use gomobile only for the transport layer.'
    origin: bootstrap from targets.md (T15)
    discovered: 2026-04-08
  T9:
    name: Makefile deploy target
    status: identified
    value: 3.0
    cost: 2.0
    acceptance:
    - make deploy deploys to Fly.io, starts machine, waits for healthy
    - make e2e-live depends on deploy target
    context: 'CI already auto-deploys to Fly.io via flyctl in .github/workflows/ci.yml on master push, and fly.toml has auto_start_machines = true + health checks. The missing pieces are purely local: Makefile has no `deploy` target (only `e2e-live` at line 56 which assumes the relay is already running), so there''s no one-line way for a developer to push a local change to Fly.io and wait for the machine to come back healthy. Low-cost extension: add a `deploy` target wrapping the same flyctl invocation CI uses, plus a health-wait loop polling /health, and make e2e-live depend on it. Prerequisite still stands: the Fly.io auth token is reportedly broken for local use.'
    origin: bootstrap from targets.md (T17)
    discovered: 2026-04-08
