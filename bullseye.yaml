  T11:
    name: Pure C client library with struct-based zero-allocation API
    status: identified
    value: 5.0
    cost: 8.0
    observable: true
    acceptance:
    - pigeon_ctx struct contains all state — keypair, session keys, nonce counters, state machine, pairing record, conn, message buffers
    - Library makes zero heap allocations — user owns the pigeon_ctx however they want (stack, static, embedded)
    - 'PIGEON_MAX_MSG is the sole #define configuration knob'
    - pigeon_init takes a pigeon_ctx* and is infallible for memory
    - 'Crypto via libsodium or BoringSSL C API: X25519, AES-256-GCM, HKDF-SHA256, 6-digit confirmation code'
    - QUIC transport via ngtcp2 (pure C, custom allocator capable)
    - Pairing state machine generated by protogen C backend (cgen.go) from protocol/pairing.yaml
    - 'Wire framing: 4-byte big-endian length prefix'
    - Send/Recv (reliable) and SendDatagram/RecvDatagram (unreliable) work end-to-end through relay
    - PairingRecord serialisation without cJSON — hand-coded fixed-schema parser to stay zero-alloc
    context: 'Pigeon currently has Go, Swift, and Kotlin clients. A pure C library maximises portability — embedded targets, game engines, FFI from any language — with no hidden allocations. The entire library state lives in a pigeon_ctx struct sized at compile time. The only dependency choice that matters is QUIC: ngtcp2 over quiche to keep the whole chain redirectable to caller-controlled memory. C23 constexpr would eliminate the last #define but C11/C17 compatibility requires it. Protogen needs a new cgen.go backend to emit the pairing state machine as C structs and dispatch tables.'
    origin: manual
    discovered: 2026-04-12
  T2:
    name: Multi-transport with LAN upgrade
    status: converging
    value: 5.0
    cost: 6.0
    acceptance:
    - Devices connected through relay can discover same LAN and upgrade to direct connection
    - pigeon.Conn abstraction hides transport — callers see single ordered message stream
    context: '1/3 sub-targets achieved: T3.1 (LAN discovery) is covered by the PathSwitch state machine (protocol/pathswitch.yaml, formal/PathSwitch.tla, executor.go, lan.go). The existing implementation already handles single-active-path switching with challenge-response verification, health monitoring (ping/pong, 3-strike failure threshold), and exponential-backoff automatic fallback. Remaining sub-targets: T2.1 (cutover with sequence-ordered delivery) and T2.2 (transparent downgrade, multi-source receive). These may need re-scoping: the current design trades a bounded in-flight-message-loss window at cutover for dramatically simpler code — if that trade-off is acceptable, T2.1 collapses to "document the loss window" and T2.2 mainly needs the downgrade path wired up automatically rather than explicitly.'
    depends_on:
    - T2.1
    - T2.2
    - T3.1
    origin: bootstrap from targets.md (T5)
    discovered: 2026-04-08
  T2.1:
    name: Cutover protocol
    status: identified
    value: 5.0
    cost: 5.0
    acceptance:
    - Each side sends CUTOVER marker as final message on old transport
    - Receiver reads from both transports, orders by sequence number
    - Old transport closed after receiving CUTOVER
    context: 'FrameCutover (0x02) byte is defined in session_gen.go and detected in executor.go:735, but currently logged and discarded rather than processed as a state transition. The PathSwitch protocol (protocol/pathswitch.yaml) has no cutover messages at all — it uses single-active-path switching via dispatcher_path rebinding, not a sequence-numbered dual-path cutover. The acceptance criteria as written require: (1) sequence-numbered messages on the wire, (2) concurrent dual-path read, (3) deterministic ordering across paths during switch. That is a design change, not an incremental extension. Decision needed before coding: is dual-path operation worth the complexity (requires sequence numbering everywhere, affects encryption nonce design, doubles receive-loop state) vs accepting a bounded in-flight-loss window at cutover (handled today by relay_resume / rebridge). If the latter, this target should be reframed to "switching is loss-free within a documented bound" and T3''s TLA+ scope shrinks accordingly.'
    depends_on:
    - T3
    origin: bootstrap from targets.md (T5.3)
    discovered: 2026-04-08
  T2.2:
    name: Transport-agnostic Conn
    status: identified
    value: 5.0
    cost: 6.0
    acceptance:
    - pigeon.Conn manages multiple underlying transports
    - Sends go on preferred transport; receives from any transport in sequence order
    - Upgrading and downgrading transparent to caller
    context: 'Upgrade direction works: the `path` struct (path.go) and executor.go activePath() pattern transparently route sends/recvs through whichever path the state machine has marked active, and LAN installation is invisible to callers. Two gaps remain: (a) automatic downgrade on LAN failure is not wired — fallbackToRelay() (conn.go:258-260) is an explicit app call, not driven by the PathSwitch RelayFallback transition; (b) sends/recvs do not merge multiple transports — only activePath is read from, so any "receive in sequence order from any transport" behaviour isn''t there. Substantially blocked by the T2.1 design decision: if dual-path operation is rejected, this target simplifies to just wiring the automatic downgrade path.'
    depends_on:
    - T3.1
    - T2.1
    origin: bootstrap from targets.md (T5.4)
    discovered: 2026-04-08
  T3:
    name: TLA+ model for cutover protocol
    status: identified
    value: 3.0
    cost: 5.0
    acceptance:
    - TLA+ spec verifies no message lost during cutover
    - No message duplicated
    - No message delivered out of order
    - No deadlock
    - Concurrent cutover initiation from both sides is safe
    context: 'formal/PathSwitch.tla and PathSwitch.cfg exist and verify the RESOURCE LIFECYCLE of the PathSwitch state machine: dispatcher always bound, monitor only when LAN active, backoff bounded, LAN requires verification, relay always available. These are structural invariants, not message-sequencing invariants. The model does NOT have a MessageLog variable, does NOT model cutover markers, does NOT verify "no message lost/duplicated/reordered during cutover", and active_path is modelled as {"relay", "lan"} so dual-path operation isn''t expressible. To achieve T3 as written requires either (a) extending PathSwitch.tla with a message-log abstraction and concurrent-cutover scenario, or (b) rewriting T3''s acceptance to match the resource-lifecycle invariants that are already proven. Blocked on the T2.1 design decision.'
    origin: bootstrap from targets.md (T10)
    discovered: 2026-04-08
