name: ci
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Increase UDP buffer size for QUIC
        run: sudo sysctl -w net.core.rmem_max=7340032 net.core.wmem_max=7340032
      - run: go test ./...

  amalgamate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Regenerate and amalgamate
        run: make amalgamate
      - name: Check for stale dist files
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date. Run 'make amalgamate' and commit the result."
            git diff dist/
            exit 1
          fi

  deploy:
    name: Deploy to Fly.io
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
