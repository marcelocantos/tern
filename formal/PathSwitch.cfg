SPECIFICATION Spec

CONSTANTS
    backend_RelayConnected = "b_RC"
    backend_LANOffered     = "b_LO"
    backend_LANActive      = "b_LA"
    backend_LANDegraded    = "b_LD"

    client_RelayConnected  = "c_RC"
    client_LANConnecting   = "c_LC"
    client_LANVerifying    = "c_LV"
    client_LANActive       = "c_LA"
    client_RelayFallback   = "c_RF"

    relay_Idle             = "r_I"
    relay_BackendRegistered = "r_BR"
    relay_Bridged          = "r_B"

    MaxChanLen       = 3
    MaxPingFailures  = 3

INVARIANTS
    PathConsistency
    RelayStaysConnected
    LANRequiresVerification
    ChannelsBounded
    PingFailuresBounded

\* LANEventuallyEstablished is a conditional liveness property —
\* it only holds when the LAN is reachable (dial succeeds). Since
\* dial success is nondeterministic in this model, we verify it
\* manually by inspecting traces rather than as a TLC property.
